apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: boutique
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      securityContext:
        runAsNonRoot: true
      containers:
        - name: frontend
          image: 400708341542.dkr.ecr.eu-central-1.amazonaws.com/frontend:5ef21682669c11bbc2b7f562c5db4a94758255ce
          securityContext:
            allowPrivilegeEscalation: false
          ports:
            - containerPort: 3000
          env:
            - name: REACT_APP_API_URL
              value: "http://gateway:3001/api"
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: boutique
spec:
  selector:
    app: frontend
  ports:
    - protocol: TCP
      port: 3000
      targetPort: 3000
  type: ClusterIP

