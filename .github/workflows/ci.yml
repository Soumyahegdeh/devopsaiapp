name: Boutique CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  IMAGE_TAG: ${{ github.sha }}

jobs:
  # security for whole repository
  security_scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Gitleaks Scan
        if: github.event_name == 'push'
        uses: gitleaks/gitleaks-action@v2

      - name: Semgrep SAST Scan
        if: github.event_name == 'push'
        uses: semgrep/semgrep-action@v1
        with:
          config: auto
          generateSarif: "1"

      - name: Upload Semgrep results
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif
        if: always()  

  # security check  for individual services
  code_security:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service:
          - auth
          - gateway
          - orders
          - order-service
          - product-service
          - user-service
          - frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache Node modules
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
        
      - name: Set SERVICE_PATH
        run: |
          if [ "${{ matrix.service }}" == "frontend" ]; then
            echo "SERVICE_PATH=projects/boutique-microservices/frontend" >> $GITHUB_ENV
          else
            echo "SERVICE_PATH=projects/boutique-microservices/backend/services/${{ matrix.service }}" >> $GITHUB_ENV
          fi

      - name: Install dependencies
        run: |
           cd $SERVICE_PATH
           npm install

      - name: Run ESLint (Code Quality Check)
        run: |
           cd $SERVICE_PATH
           if npm run | grep -q "lint"; then
              npm run lint
           else
              echo "No lint script found, skipping..."
           fi

      - name: Run Snyk Security Scan
        run: |
           cd $SERVICE_PATH
           npx snyk test --severity-threshold=critical
        env:
         SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Run Tests (if available)
        run: |
          cd $SERVICE_PATH
          if [ -d "tests" ] || [ -d "__tests__" ]; then
            npm test
          else
            echo "No tests found"
          fi

  build-and-push:
    runs-on: ubuntu-latest
    needs: code_security

    strategy:
      matrix:
        service:
          - auth
          - gateway
          - orders
          - order-service
          - product-service
          - user-service
          - frontend

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
   
        # Configure AWS Credentials
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
      
        # login to AWS ECR
      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region $AWS_REGION | \
          docker login --username AWS \
          --password-stdin ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.$AWS_REGION.amazonaws.com
        
        
        # Setup Docker Buildx (for caching)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3


       # Set variables
      - name: Set variables
        run: |
           if [ "${{ matrix.service }}" == "frontend" ]; then
              echo "BUILD_PATH=projects/boutique-microservices/frontend" >> $GITHUB_ENV
           else
              echo "BUILD_PATH=projects/boutique-microservices/backend/services/${{ matrix.service }}" >> $GITHUB_ENV
           fi

           echo "IMAGE_URI=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ matrix.service }}" >> $GITHUB_ENV
           echo "IMAGE_TAG=${{ github.sha }}" >> $GITHUB_ENV
     
       # Build with caching (BIG improvement)
      - name: Build Docker Image with cache
        uses: docker/build-push-action@v5
        with:
          context: ${{ env.BUILD_PATH }}
          push: false                   
          load: true  
          tags: |
            ${{ env.IMAGE_URI }}:${{ env.IMAGE_TAG }}
            ${{ env.IMAGE_URI }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
        
       # Trivy Scan
      - name: Scan Docker Image with Trivy
        uses: aquasecurity/trivy-action@v0.20.0
        with:
          image-ref: ${{ env.IMAGE_URI }}:${{ env.IMAGE_TAG }}
          format: table
          exit-code: 1
          severity: HIGH,CRITICAL

      # Push image (only if scan passes)
      - name: Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ${{ env.BUILD_PATH }}
          push: true                     # ← now push
          tags: |
            ${{ env.IMAGE_URI }}:${{ env.IMAGE_TAG }}
            ${{ env.IMAGE_URI }}:latest
          cache-from: type=gha        
          cache-to: type=gha,mode=max
    

    