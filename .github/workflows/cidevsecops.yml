name: Boutique CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  IMAGE_TAG: ${{ github.sha }}

jobs:
  # security for whole repository
  security_scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Gitleaks Scan
        if: github.event_name == 'push'
        uses: gitleaks/gitleaks-action@v2

      - name: Semgrep SAST Scan
        if: github.event_name == 'push'
        uses: returntocorp/semgrep-action@v1
        with:
          config: auto

  # security check  for individual services
  code_security:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service:
          - auth
          - gateway
          - orders
          - order-service
          - product-service
          - user-service
          - frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache Node modules
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
        
      - name: Set SERVICE_PATH
        run: |
          if [ "${{ matrix.service }}" == "frontend" ]; then
            echo "SERVICE_PATH=projects/boutique-microservices/frontend" >> $GITHUB_ENV
          else
            echo "SERVICE_PATH=projects/boutique-microservices/backend/services/${{ matrix.service }}" >> $GITHUB_ENV
          fi

      - name: Install dependencies
        run: |
           cd $SERVICE_PATH
           npm install

      - name: Run ESLint (Code Quality Check)
        run: |
           cd $SERVICE_PATH
           if npm run | grep -q "lint"; then
              npm run lint
           else
              echo "No lint script found, skipping..."
           fi

      - name: Run Snyk Security Scan
        run: |
           cd $SERVICE_PATH
           npx snyk test --severity-threshold=high
        env:
         SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Run Tests (if available)
        run: |
          cd $SERVICE_PATH
          if [ -d "tests" ] || [ -d "__tests__" ]; then
            npm test
          else
            echo "No tests found"
          fi